<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title><!-- BRAND: Product name + Promo --></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       BRAND VARS — edit these for your product
       ═══════════════════════════════════════════ */
    :root {
      --bg:        #0A0F1E;   /* main background */
      --surface:   #111A33;   /* card / mockup background */
      --surface2:  #182241;   /* card gradient end */
      --divider:   #1F2A44;   /* borders / separators */
      --accent:    #4F46E5;   /* primary brand color */
      --accent2:   #8B82F2;   /* accent gradient end */
      --text:      #F8FAFC;   /* primary text */
      --muted:     #94A3B8;   /* secondary text */
      --green:     #10B981;
      --amber:     #F59E0B;
      --font:      'Inter', system-ui, sans-serif;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      overflow: hidden;
    }

    [data-composition-id="product-promo-mobile"] {
      position: relative;
      width: 1080px; height: 1920px;
      background: var(--bg);
      overflow: hidden;
    }

    /* Ambient glow — change RGB to match --accent */
    .glow {
      position: absolute; top: 50%; left: 50%;
      width: 1400px; height: 1400px;
      margin: -700px 0 0 -700px;
      background: radial-gradient(circle, rgba(79,70,229,0.18) 0%, transparent 62%);
      filter: blur(60px);
      pointer-events: none;
    }

    .scene {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 120px 64px;
      box-sizing: border-box;
      opacity: 0;
    }

    /* ─── Scene 0: Brand stamp ─── */
    .brand-logo {
      width: 160px; height: 160px;
      object-fit: contain;
      border-radius: 32px;
    }
    .brand-name {
      font-size: 80px; font-weight: 900;
      margin-top: 32px;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      /* BRAND: replace with your product name */
    }
    .brand-tagline {
      font-size: 40px; font-weight: 600;
      color: var(--muted); margin-top: 16px;
      /* BRAND: replace with your tagline */
    }

    /* ─── Scene 1: Hook ─── */
    .hook-eyebrow {
      font-size: 30px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 32px;
      /* BRAND: e.g. "YOURAPP · CRM" */
    }
    .hook-question {
      font-size: 72px; font-weight: 900;
      line-height: 1.12; text-align: center;
      /* COPY: your hook question — opens tension */
    }
    .hook-sub {
      font-size: 44px; font-weight: 600;
      color: var(--muted); text-align: center;
      margin-top: 24px; line-height: 1.4;
      /* COPY: short subtitle, no verb, declarative */
    }
    .sticker {
      position: absolute;
      padding: 16px 28px; border-radius: 18px; border: 3px solid;
      font-size: 30px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      backdrop-filter: blur(2px);
    }
    .sticker.accent  { border-color: var(--accent);  color: var(--accent);  background: rgba(79,70,229,0.12); }
    .sticker.green   { border-color: var(--green);   color: var(--green);   background: rgba(16,185,129,0.12); }
    .sticker.amber   { border-color: var(--amber);   color: var(--amber);   background: rgba(245,158,11,0.12); }

    /* ─── Card (shared) ─── */
    .card {
      width: 920px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(79,70,229,0.1);
      overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 36px 20px;
      border-bottom: 1px solid var(--divider);
    }
    .mac-dots { display: flex; gap: 10px; }
    .mac-dot  { width: 18px; height: 18px; border-radius: 50%; }
    .mac-dot.r { background: #FF5F57; }
    .mac-dot.y { background: #FEBC2E; }
    .mac-dot.g { background: #28C840; }
    .card-title { font-size: 32px; font-weight: 700; }
    .card-tag {
      font-size: 24px; font-weight: 700;
      color: var(--accent2);
      background: rgba(79,70,229,0.15);
      border-radius: 8px; padding: 6px 16px;
    }
    .card-body { padding: 28px 36px; }

    /* Stats row */
    .stats { display: flex; gap: 20px; margin-bottom: 28px; }
    .stat {
      flex: 1; background: rgba(255,255,255,0.04);
      border-radius: 16px; padding: 20px;
      text-align: center;
    }
    .stat-num {
      font-size: 60px; font-weight: 900;
      background: linear-gradient(to right, var(--text), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-variant-numeric: tabular-nums;
    }
    .stat-label { font-size: 22px; font-weight: 600; color: var(--muted); margin-top: 8px; }

    /* Table rows */
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid var(--divider);
      font-size: 28px;
    }
    .row:last-child { border-bottom: none; }
    .row-name { font-weight: 600; }
    .row-meta { color: var(--muted); font-size: 24px; }
    .badge {
      font-size: 22px; font-weight: 700; padding: 6px 16px;
      border-radius: 20px; display: flex; align-items: center; gap: 8px;
    }
    .badge-dot { width: 10px; height: 10px; border-radius: 50%; }
    .badge.done    { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge.active  { background: rgba(79,70,229,0.15);  color: var(--accent2); }
    .badge.pending { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.done .badge-dot    { background: var(--green); }
    .badge.active .badge-dot  { background: var(--accent2); }
    .badge.pending .badge-dot { background: var(--amber); }

    /* Card B: Kanban */
    .kanban { display: flex; gap: 16px; }
    .kanban-col { flex: 1; }
    .kanban-label {
      font-size: 22px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
      margin-bottom: 16px;
    }
    .kanban-item {
      border-radius: 12px; padding: 16px 18px;
      margin-bottom: 12px; font-size: 24px; font-weight: 600;
      border-left: 3px solid;
      background: rgba(255,255,255,0.03);
    }
    .kanban-item.pending { border-color: var(--amber);  }
    .kanban-item.active  { border-color: var(--accent2);}
    .kanban-item.done    { border-color: var(--green);  }
    .kanban-sub { font-size: 20px; color: var(--muted); margin-top: 6px; }

    /* Card C: Feature list */
    .feature-list { display: flex; flex-direction: column; gap: 0; }
    .feature-row {
      display: flex; align-items: center; gap: 24px;
      padding: 22px 0; border-bottom: 1px solid var(--divider);
      font-size: 28px; font-weight: 600;
    }
    .feature-row:last-child { border-bottom: none; }
    .feature-icon { font-size: 36px; width: 56px; text-align: center; }
    .feature-val  { margin-left: auto; font-size: 40px; font-weight: 900;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ─── Scene 5: CTA ─── */
    .cta-logo { width: 140px; height: 140px; object-fit: contain; border-radius: 28px; }
    .cta-offer {
      font-size: 56px; font-weight: 900; text-align: center;
      margin-top: 36px; line-height: 1.2;
    }
    .cta-pill {
      margin-top: 40px;
      background: rgba(79,70,229,0.2);
      border: 2px solid var(--accent);
      border-radius: 60px; padding: 24px 64px;
      font-size: 48px; font-weight: 800;
      color: var(--accent2);
      letter-spacing: 0.02em;
      /* BRAND: replace with your domain */
    }

    /* Card label above card */
    .card-label {
      font-size: 52px; font-weight: 900;
      text-align: center; margin-bottom: 32px;
      width: 100%;
    }
  </style>
</head>
<body>

<div
  id="stage"
  data-composition-id="product-promo-mobile"
  data-width="1080"
  data-height="1920"
  data-fps="30"
  data-duration="30"
>
  <div class="glow"></div>

  <!-- ── AUDIO ── attach after generating voice.mp3 ──────────────────── -->
  <audio
    src="voice.mp3"
    data-start="1.0"
    data-duration="25.0"
    data-volume="1"
  ></audio>

  <!-- ═══ SCENE 0 · Brand stamp · 0 – 0.85s ═══════════════════════════ -->
  <div class="scene" id="s0" data-start="0" data-duration="0.85" data-track-index="0">
    <!-- BRAND: replace with your logo -->
    <img class="brand-logo" src="assets/logo.png" onerror="this.style.display='none'" alt="Logo" />
    <div class="brand-name"><!-- BRAND: Product Name --></div>
    <div class="brand-tagline"><!-- BRAND: Your tagline --></div>
  </div>

  <!-- ═══ SCENE 1 · Hook · 0.85 – 3.0s ════════════════════════════════ -->
  <div class="scene" id="s1" data-start="0.85" data-duration="2.15" data-track-index="1">
    <div class="hook-eyebrow"><!-- BRAND: YOURAPP · CATEGORY --></div>
    <div class="hook-question"><!-- COPY: ¿Your hook question here? --></div>
    <div class="hook-sub"><!-- COPY: Short declarative sub. No verb. --></div>
    <!-- Stickers — uncomment and customize -->
    <!-- <div class="sticker accent" style="top:220px;right:80px;transform:rotate(6deg)">2025</div> -->
    <!-- <div class="sticker amber" style="bottom:340px;left:60px;transform:rotate(-5deg)">SIN CAOS</div> -->
  </div>

  <!-- ═══ SCENE 2 · Card A · Panel overview · 3.0 – 9.7s ═════════════ -->
  <div class="scene" id="s2" data-start="3.0" data-duration="6.7" data-track-index="2">
    <div class="card-label"><!-- COPY: Feature area name · e.g. "Panel de control" --></div>
    <div class="card">
      <div class="card-header">
        <div class="mac-dots">
          <div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div>
        </div>
        <div class="card-title"><!-- COPY: card title --></div>
        <div class="card-tag"><!-- COPY: status tag --></div>
      </div>
      <div class="card-body">
        <div class="stats">
          <div class="stat">
            <div class="stat-num"><!-- NUM -->42</div>
            <div class="stat-label"><!-- LABEL -->Clientes</div>
          </div>
          <div class="stat">
            <div class="stat-num"><!-- NUM -->18</div>
            <div class="stat-label"><!-- LABEL -->Activos</div>
          </div>
          <div class="stat">
            <div class="stat-num"><!-- NUM -->$320k</div>
            <div class="stat-label"><!-- LABEL -->Facturado</div>
          </div>
        </div>
        <!-- COPY: replace with real data rows for your product -->
        <div class="row">
          <span class="row-name">Empresa Alfa</span>
          <span class="row-meta">Plan Pro</span>
          <span class="badge done"><span class="badge-dot"></span>Al día</span>
        </div>
        <div class="row">
          <span class="row-name">Beta SRL</span>
          <span class="row-meta">Plan Básico</span>
          <span class="badge active"><span class="badge-dot"></span>En curso</span>
        </div>
        <div class="row">
          <span class="row-name">Gamma SA</span>
          <span class="row-meta">Plan Pro</span>
          <span class="badge pending"><span class="badge-dot"></span>Pendiente</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCENE 3 · Card B · Active flow (kanban) · 9.7 – 15.7s ══════ -->
  <div class="scene" id="s3" data-start="9.7" data-duration="6.0" data-track-index="3">
    <div class="card-label"><!-- COPY: e.g. "Pipeline activo" --></div>
    <div class="card">
      <div class="card-header">
        <div class="mac-dots">
          <div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div>
        </div>
        <div class="card-title"><!-- COPY: card title --></div>
        <div class="card-tag"><!-- COPY: tag --></div>
      </div>
      <div class="card-body">
        <div class="kanban">
          <div class="kanban-col">
            <div class="kanban-label">Pendiente</div>
            <div class="kanban-item pending"><!-- COPY: item 1 --><div class="kanban-sub"><!-- meta --></div></div>
            <div class="kanban-item pending"><!-- COPY: item 2 --><div class="kanban-sub"><!-- meta --></div></div>
          </div>
          <div class="kanban-col">
            <div class="kanban-label">En curso</div>
            <div class="kanban-item active"><!-- COPY: item 3 --><div class="kanban-sub"><!-- meta --></div></div>
            <div class="kanban-item active"><!-- COPY: item 4 --><div class="kanban-sub"><!-- meta --></div></div>
          </div>
          <div class="kanban-col">
            <div class="kanban-label">Listo</div>
            <div class="kanban-item done"><!-- COPY: item 5 --><div class="kanban-sub"><!-- meta --></div></div>
            <div class="kanban-item done"><!-- COPY: item 6 --><div class="kanban-sub"><!-- meta --></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCENE 4 · Card C · Summary / Features · 15.7 – 21.6s ═══════ -->
  <div class="scene" id="s4" data-start="15.7" data-duration="5.9" data-track-index="4">
    <div class="card-label"><!-- COPY: e.g. "Listo para hoy" --></div>
    <div class="card">
      <div class="card-header">
        <div class="mac-dots">
          <div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div>
        </div>
        <div class="card-title"><!-- COPY: card title --></div>
        <div class="card-tag"><!-- COPY: tag --></div>
      </div>
      <div class="card-body">
        <div class="feature-list">
          <!-- COPY: list your top 4 features / results -->
          <div class="feature-row">
            <div class="feature-icon">📋</div>
            <span><!-- Feature name --></span>
            <span class="feature-val"><!-- Value --></span>
          </div>
          <div class="feature-row">
            <div class="feature-icon">⚡</div>
            <span><!-- Feature name --></span>
            <span class="feature-val"><!-- Value --></span>
          </div>
          <div class="feature-row">
            <div class="feature-icon">🔔</div>
            <span><!-- Feature name --></span>
            <span class="feature-val"><!-- Value --></span>
          </div>
          <div class="feature-row">
            <div class="feature-icon">✅</div>
            <span><!-- Feature name --></span>
            <span class="feature-val"><!-- Value --></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCENE 5 · CTA · 21.6 – 30s ══════════════════════════════════ -->
  <div class="scene" id="s5" data-start="21.6" data-duration="8.4" data-track-index="5">
    <img class="cta-logo" src="assets/logo.png" onerror="this.style.display='none'" alt="Logo" />
    <div class="cta-offer">
      <!-- COPY: your offer — e.g. "30 días gratis" -->
      30 días gratis<br>sin tarjeta
    </div>
    <div class="cta-pill"><!-- BRAND: your.domain.com --></div>
    <!-- CTA stickers -->
    <div class="sticker green" style="top:1380px;right:90px;transform:rotate(5deg)">GRATIS</div>
    <div class="sticker accent" style="top:1520px;left:70px;transform:rotate(-6deg)">SIN TARJETA</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const tl = gsap.timeline({ paused: true })

// ── Scene 0: Brand stamp ──────────────────────────────────────────────
tl.to('#s0', { opacity: 1, duration: 0 }, 0)
tl.from('#s0 .brand-logo',    { scale: 0.7, opacity: 0, duration: 0.4, ease: 'back.out(1.4)' }, 0.05)
tl.from('#s0 .brand-name',    { y: 30, opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.25)
tl.from('#s0 .brand-tagline', { y: 20, opacity: 0, duration: 0.3,  ease: 'power2.out' }, 0.38)
tl.to('#s0', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 0.5)

// ── Scene 1: Hook ─────────────────────────────────────────────────────
tl.to('#s1', { opacity: 1, duration: 0 }, 0.85)
tl.from('#s1 .hook-eyebrow',  { y: -24, opacity: 0, duration: 0.3, ease: 'power2.out' }, 0.9)
tl.from('#s1 .hook-question', { y: 40,  opacity: 0, duration: 0.4, ease: 'power3.out' }, 1.0)
tl.from('#s1 .hook-sub',      { y: 24,  opacity: 0, duration: 0.35,ease: 'power2.out' }, 1.2)
tl.from('#s1 .sticker',       { scale: 0.5, opacity: 0, stagger: 0.12, duration: 0.3, ease: 'back.out(2)' }, 1.3)
tl.to('#s1', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 2.65)

// ── Scene 2: Card A ───────────────────────────────────────────────────
tl.to('#s2', { opacity: 1, duration: 0 }, 3.0)
tl.from('#s2 .card-label', { y: -30, opacity: 0, duration: 0.35, ease: 'power2.out' }, 3.05)
tl.from('#s2 .card',       { y: 60,  opacity: 0, duration: 0.5,  ease: 'power3.out' }, 3.15)
tl.from('#s2 .stat',       { y: 20,  opacity: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out' }, 3.5)
tl.from('#s2 .row',        { x: -20, opacity: 0, stagger: 0.1,  duration: 0.3, ease: 'power2.out' }, 3.8)
tl.to('#s2', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 9.35)

// ── Scene 3: Card B ───────────────────────────────────────────────────
tl.to('#s3', { opacity: 1, duration: 0 }, 9.7)
tl.from('#s3 .card-label',   { y: -30, opacity: 0, duration: 0.35, ease: 'power2.out' }, 9.75)
tl.from('#s3 .card',         { y: 60,  opacity: 0, duration: 0.5,  ease: 'power3.out' }, 9.85)
tl.from('#s3 .kanban-col',   { y: 30,  opacity: 0, stagger: 0.12, duration: 0.35, ease: 'power2.out' }, 10.2)
tl.from('#s3 .kanban-item',  { x: -16, opacity: 0, stagger: 0.08, duration: 0.28, ease: 'power2.out' }, 10.45)
tl.to('#s3', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 15.35)

// ── Scene 4: Card C ───────────────────────────────────────────────────
tl.to('#s4', { opacity: 1, duration: 0 }, 15.7)
tl.from('#s4 .card-label',   { y: -30, opacity: 0, duration: 0.35, ease: 'power2.out' }, 15.75)
tl.from('#s4 .card',         { y: 60,  opacity: 0, duration: 0.5,  ease: 'power3.out' }, 15.85)
tl.from('#s4 .feature-row',  { x: -24, opacity: 0, stagger: 0.1,  duration: 0.32, ease: 'power2.out' }, 16.2)
tl.to('#s4', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 21.25)

// ── Scene 5: CTA ──────────────────────────────────────────────────────
tl.to('#s5', { opacity: 1, duration: 0 }, 21.6)
tl.from('#s5 .cta-logo',   { scale: 0.6, opacity: 0, duration: 0.45, ease: 'back.out(1.5)' }, 21.65)
tl.from('#s5 .cta-offer',  { y: 40,  opacity: 0, duration: 0.5,  ease: 'power3.out' }, 21.95)
tl.from('#s5 .cta-pill',   { scale: 0.85, opacity: 0, duration: 0.4, ease: 'back.out(1.4)' }, 22.35)
tl.from('#s5 .sticker',    { scale: 0.4,  opacity: 0, stagger: 0.15, duration: 0.35, ease: 'back.out(2)' }, 22.6)

window.__timelines = window.__timelines || {}
window.__timelines['product-promo-mobile'] = tl
</script>
</body>
</html>
