<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title><!-- BRAND: name --></title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0A0F1E;
      --accent:  #4F46E5;
      --accent2: #8B82F2;
      --text:    #F8FAFC;
      --muted:   #94A3B8;
      --green:   #10B981;
      --font:    'Inter', system-ui, sans-serif;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font); color: var(--text); overflow: hidden; }
    [data-composition-id="minimal-mobile"] { position: relative; width: 1080px; height: 1920px; background: var(--bg); overflow: hidden; }
    .glow {
      position: absolute; top: 50%; left: 50%;
      width: 1200px; height: 1200px; margin: -600px 0 0 -600px;
      background: radial-gradient(circle, rgba(79,70,229,0.2) 0%, transparent 60%);
      filter: blur(60px); pointer-events: none;
    }
    .scene {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 140px 80px; box-sizing: border-box; opacity: 0;
    }
    .eyebrow { font-size: 28px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent2); margin-bottom: 36px; }
    .headline { font-size: 96px; font-weight: 900; line-height: 1.08; text-align: center; }
    .grad { background: linear-gradient(to right, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: 48px; font-weight: 600; color: var(--muted); text-align: center; margin-top: 28px; line-height: 1.4; }
    .pill {
      margin-top: 60px; background: rgba(79,70,229,0.18); border: 2px solid var(--accent);
      border-radius: 60px; padding: 28px 72px;
      font-size: 52px; font-weight: 800; color: var(--accent2);
    }
    .offer { font-size: 64px; font-weight: 900; text-align: center; line-height: 1.2; margin-bottom: 16px; }
    .sticker {
      position: absolute; padding: 16px 28px; border-radius: 18px; border: 3px solid;
      font-size: 30px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .sticker.green  { border-color: var(--green);  color: var(--green);  background: rgba(16,185,129,0.12); }
    .sticker.accent { border-color: var(--accent); color: var(--accent); background: rgba(79,70,229,0.12); }
  </style>
</head>
<body>
<div id="stage" data-composition-id="minimal-mobile" data-width="1080" data-height="1920" data-fps="30" data-duration="20">
  <div class="glow"></div>
  <audio src="voice.mp3" data-start="0.5" data-duration="16.0" data-volume="1"></audio>

  <!-- SCENE 0 · Hook · 0 – 8s -->
  <div class="scene" id="s0" data-start="0" data-duration="8" data-track-index="0">
    <div class="eyebrow"><!-- BRAND: YOURAPP · CATEGORY --></div>
    <div class="headline"><!-- COPY: Bold headline.<br><span class="grad">Gradient word.</span> --></div>
    <div class="sub"><!-- COPY: One-line sub. No verb. --></div>
  </div>

  <!-- SCENE 1 · Middle · 8 – 14s -->
  <div class="scene" id="s1" data-start="8" data-duration="6" data-track-index="1">
    <div class="eyebrow"><!-- COPY: section label --></div>
    <div class="headline" style="font-size:80px;"><!-- COPY: feature / benefit --></div>
    <div class="sub"><!-- COPY: supporting line --></div>
  </div>

  <!-- SCENE 2 · CTA · 14 – 20s -->
  <div class="scene" id="s2" data-start="14" data-duration="6" data-track-index="2">
    <div class="offer">30 días gratis<br>sin tarjeta</div>
    <div class="pill"><!-- BRAND: your.domain.com --></div>
    <div class="sticker green"  style="top:1340px;right:80px;transform:rotate(5deg)">GRATIS</div>
    <div class="sticker accent" style="top:1490px;left:60px;transform:rotate(-6deg)">SIN TARJETA</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const tl = gsap.timeline({ paused: true })

tl.to('#s0', { opacity: 1, duration: 0 }, 0)
tl.from('#s0 .eyebrow',   { y: -24, opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.1)
tl.from('#s0 .headline',  { y: 48,  opacity: 0, duration: 0.5,  ease: 'power3.out' }, 0.25)
tl.from('#s0 .sub',       { y: 28,  opacity: 0, duration: 0.4,  ease: 'power2.out' }, 0.55)
tl.to('#s0', { opacity: 0, duration: 0.4, ease: 'power2.inOut' }, 7.6)

tl.to('#s1', { opacity: 1, duration: 0 }, 8)
tl.from('#s1 .eyebrow',   { y: -20, opacity: 0, duration: 0.3, ease: 'power2.out' }, 8.1)
tl.from('#s1 .headline',  { y: 40,  opacity: 0, duration: 0.45, ease: 'power3.out' }, 8.25)
tl.from('#s1 .sub',       { y: 24,  opacity: 0, duration: 0.35, ease: 'power2.out' }, 8.55)
tl.to('#s1', { opacity: 0, duration: 0.4, ease: 'power2.inOut' }, 13.6)

tl.to('#s2', { opacity: 1, duration: 0 }, 14)
tl.from('#s2 .offer',   { y: 36,  opacity: 0, duration: 0.5,  ease: 'power3.out' }, 14.1)
tl.from('#s2 .pill',    { scale: 0.85, opacity: 0, duration: 0.4, ease: 'back.out(1.4)' }, 14.5)
tl.from('#s2 .sticker', { scale: 0.4,  opacity: 0, stagger: 0.15, duration: 0.35, ease: 'back.out(2)' }, 14.8)

window.__timelines = window.__timelines || {}
window.__timelines['minimal-mobile'] = tl
</script>
</body>
</html>
