<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title><!-- BRAND: name --></title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0A0F1E;
      --accent:  #4F46E5;
      --accent2: #8B82F2;
      --text:    #F8FAFC;
      --muted:   #94A3B8;
      --green:   #10B981;
      --font:    'Inter', system-ui, sans-serif;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font); color: var(--text); overflow: hidden; }
    [data-composition-id="minimal-desktop"] { position: relative; width: 1920px; height: 1080px; background: var(--bg); overflow: hidden; }
    .glow {
      position: absolute; top: 50%; left: 50%;
      width: 1000px; height: 1000px; margin: -500px 0 0 -500px;
      background: radial-gradient(circle, rgba(79,70,229,0.18) 0%, transparent 60%);
      filter: blur(60px); pointer-events: none;
    }
    .scene {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 160px; box-sizing: border-box; opacity: 0; gap: 100px;
    }
    .copy { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .eyebrow { font-size: 22px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent2); margin-bottom: 28px; }
    .headline { font-size: 80px; font-weight: 900; line-height: 1.1; }
    .grad { background: linear-gradient(to right, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: 34px; font-weight: 600; color: var(--muted); margin-top: 24px; line-height: 1.4; }
    .visual { flex: 1; display: flex; align-items: center; justify-content: center; }
    .pill {
      background: rgba(79,70,229,0.18); border: 2px solid var(--accent);
      border-radius: 50px; padding: 22px 60px;
      font-size: 44px; font-weight: 800; color: var(--accent2);
    }
    .offer { font-size: 72px; font-weight: 900; line-height: 1.15; margin-bottom: 32px; }
    .sticker {
      padding: 14px 24px; border-radius: 14px; border: 2px solid;
      font-size: 26px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .sticker.green  { border-color: var(--green);  color: var(--green);  background: rgba(16,185,129,0.12); }
    .sticker.accent { border-color: var(--accent); color: var(--accent); background: rgba(79,70,229,0.12); }
  </style>
</head>
<body>
<div id="stage" data-composition-id="minimal-desktop" data-width="1920" data-height="1080" data-fps="30" data-duration="20">
  <div class="glow"></div>
  <audio src="voice.mp3" data-start="0.5" data-duration="16.0" data-volume="1"></audio>

  <!-- SCENE 0 · Hook · 0 – 8s -->
  <div class="scene" id="s0" data-start="0" data-duration="8" data-track-index="0">
    <div class="copy">
      <div class="eyebrow"><!-- BRAND: YOURAPP · CATEGORY --></div>
      <div class="headline"><!-- COPY: Bold headline. --></div>
      <div class="sub"><!-- COPY: One-line sub. --></div>
    </div>
    <div class="visual">
      <!-- Optional: logo, screenshot mockup, or decorative element -->
      <div style="width:360px;height:360px;border-radius:40px;border:2px solid rgba(79,70,229,0.3);display:flex;align-items:center;justify-content:center;">
        <img src="assets/logo.png" style="width:220px;height:220px;object-fit:contain;border-radius:24px;" onerror="this.style.display='none'" alt="" />
      </div>
    </div>
  </div>

  <!-- SCENE 1 · Middle · 8 – 14s -->
  <div class="scene" id="s1" data-start="8" data-duration="6" data-track-index="1">
    <div class="copy">
      <div class="eyebrow"><!-- COPY: section label --></div>
      <div class="headline"><!-- COPY: feature / benefit --></div>
      <div class="sub"><!-- COPY: supporting line --></div>
    </div>
    <div class="visual" style="flex-direction:column;gap:20px;">
      <!-- Add bullet points, small stats, or decorative element -->
    </div>
  </div>

  <!-- SCENE 2 · CTA · 14 – 20s -->
  <div class="scene" id="s2" data-start="14" data-duration="6" data-track-index="2">
    <div class="copy">
      <div class="offer">30 días gratis<br>sin tarjeta</div>
      <div class="pill"><!-- BRAND: your.domain.com --></div>
    </div>
    <div class="visual" style="flex-direction:column;gap:28px;align-items:flex-start;">
      <div class="sticker green"  style="transform:rotate(4deg)">GRATIS</div>
      <div class="sticker accent" style="transform:rotate(-5deg)">SIN TARJETA</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const tl = gsap.timeline({ paused: true })

tl.to('#s0', { opacity: 1, duration: 0 }, 0)
tl.from('#s0 .eyebrow',  { y: -20, opacity: 0, duration: 0.3, ease: 'power2.out' }, 0.1)
tl.from('#s0 .headline', { y: 40,  opacity: 0, duration: 0.45, ease: 'power3.out' }, 0.25)
tl.from('#s0 .sub',      { y: 24,  opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.5)
tl.from('#s0 .visual > *', { scale: 0.8, opacity: 0, duration: 0.5, ease: 'back.out(1.3)' }, 0.3)
tl.to('#s0', { opacity: 0, duration: 0.4, ease: 'power2.inOut' }, 7.6)

tl.to('#s1', { opacity: 1, duration: 0 }, 8)
tl.from('#s1 .eyebrow',  { y: -20, opacity: 0, duration: 0.3, ease: 'power2.out' }, 8.1)
tl.from('#s1 .headline', { y: 36,  opacity: 0, duration: 0.4, ease: 'power3.out' }, 8.25)
tl.from('#s1 .sub',      { y: 20,  opacity: 0, duration: 0.35, ease: 'power2.out' }, 8.5)
tl.to('#s1', { opacity: 0, duration: 0.4, ease: 'power2.inOut' }, 13.6)

tl.to('#s2', { opacity: 1, duration: 0 }, 14)
tl.from('#s2 .offer',    { y: 32, opacity: 0, duration: 0.5,  ease: 'power3.out' }, 14.1)
tl.from('#s2 .pill',     { scale: 0.85, opacity: 0, duration: 0.4, ease: 'back.out(1.4)' }, 14.5)
tl.from('#s2 .sticker',  { scale: 0.4, opacity: 0, stagger: 0.15, duration: 0.35, ease: 'back.out(2)' }, 14.8)

window.__timelines = window.__timelines || {}
window.__timelines['minimal-desktop'] = tl
</script>
</body>
</html>
