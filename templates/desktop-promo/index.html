<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title><!-- BRAND: Product name + Promo --></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       BRAND VARS — edit these for your product
       ═══════════════════════════════════════════ */
    :root {
      --bg:        #0A0F1E;
      --surface:   #111A33;
      --surface2:  #182241;
      --divider:   #1F2A44;
      --accent:    #4F46E5;
      --accent2:   #8B82F2;
      --text:      #F8FAFC;
      --muted:     #94A3B8;
      --green:     #10B981;
      --amber:     #F59E0B;
      --font:      'Inter', system-ui, sans-serif;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      overflow: hidden;
    }

    [data-composition-id="product-promo-desktop"] {
      position: relative;
      width: 1920px; height: 1080px;
      background: var(--bg);
      overflow: hidden;
    }

    .glow {
      position: absolute; top: 50%; left: 50%;
      width: 1200px; height: 1200px;
      margin: -600px 0 0 -600px;
      background: radial-gradient(circle, rgba(79,70,229,0.16) 0%, transparent 60%);
      filter: blur(60px);
      pointer-events: none;
    }

    .scene {
      position: absolute; inset: 0;
      display: flex;
      align-items: center; justify-content: center;
      padding: 60px 100px;
      box-sizing: border-box;
      opacity: 0;
      gap: 80px;
    }

    /* ─── Brand stamp (centered) ─── */
    .brand-col { display: flex; flex-direction: column; align-items: center; }
    .brand-logo { width: 120px; height: 120px; object-fit: contain; border-radius: 24px; }
    .brand-name {
      font-size: 72px; font-weight: 900; margin-top: 24px;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-tagline { font-size: 32px; font-weight: 600; color: var(--muted); margin-top: 12px; }

    /* ─── Hook: left copy + right visual ─── */
    .hook-copy { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .hook-eyebrow {
      font-size: 22px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent2); margin-bottom: 24px;
    }
    .hook-question { font-size: 64px; font-weight: 900; line-height: 1.1; }
    .hook-sub { font-size: 32px; font-weight: 600; color: var(--muted); margin-top: 20px; line-height: 1.4; }

    /* ─── Card ─── */
    .card {
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(79,70,229,0.1);
      overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px 14px;
      border-bottom: 1px solid var(--divider);
    }
    .mac-dots { display: flex; gap: 8px; }
    .mac-dot  { width: 14px; height: 14px; border-radius: 50%; }
    .mac-dot.r { background: #FF5F57; } .mac-dot.y { background: #FEBC2E; } .mac-dot.g { background: #28C840; }
    .card-title { font-size: 24px; font-weight: 700; }
    .card-tag { font-size: 18px; font-weight: 700; color: var(--accent2); background: rgba(79,70,229,0.15); border-radius: 6px; padding: 4px 12px; }
    .card-body { padding: 20px 28px; }

    .stats { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat { flex: 1; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-num { font-size: 44px; font-weight: 900;
      background: linear-gradient(to right, var(--text), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 16px; font-weight: 600; color: var(--muted); margin-top: 4px; }

    .row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--divider); font-size: 20px; }
    .row:last-child { border-bottom: none; }
    .row-name { font-weight: 600; }
    .row-meta { color: var(--muted); font-size: 16px; }
    .badge { font-size: 15px; font-weight: 700; padding: 4px 12px; border-radius: 14px; display: flex; align-items: center; gap: 6px; }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; }
    .badge.done    { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge.active  { background: rgba(79,70,229,0.15);  color: var(--accent2); }
    .badge.pending { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.done .badge-dot    { background: var(--green); }
    .badge.active .badge-dot  { background: var(--accent2); }
    .badge.pending .badge-dot { background: var(--amber); }

    /* Kanban */
    .kanban { display: flex; gap: 12px; }
    .kanban-col { flex: 1; }
    .kanban-label { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
    .kanban-item { border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 17px; font-weight: 600; border-left: 3px solid; background: rgba(255,255,255,0.03); }
    .kanban-item.pending { border-color: var(--amber); }
    .kanban-item.active  { border-color: var(--accent2); }
    .kanban-item.done    { border-color: var(--green); }
    .kanban-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* Feature list */
    .feature-list { display: flex; flex-direction: column; }
    .feature-row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--divider); font-size: 20px; font-weight: 600; }
    .feature-row:last-child { border-bottom: none; }
    .feature-icon { font-size: 26px; width: 40px; text-align: center; }
    .feature-val { margin-left: auto; font-size: 28px; font-weight: 900;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* CTA */
    .cta-copy { flex: 1; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; }
    .cta-offer { font-size: 72px; font-weight: 900; line-height: 1.15; }
    .cta-pill {
      margin-top: 36px;
      background: rgba(79,70,229,0.2); border: 2px solid var(--accent);
      border-radius: 50px; padding: 18px 52px;
      font-size: 40px; font-weight: 800; color: var(--accent2);
    }
    .sticker {
      position: absolute; padding: 12px 22px; border-radius: 14px; border: 2px solid;
      font-size: 22px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      backdrop-filter: blur(2px);
    }
    .sticker.accent  { border-color: var(--accent);  color: var(--accent);  background: rgba(79,70,229,0.12); }
    .sticker.green   { border-color: var(--green);   color: var(--green);   background: rgba(16,185,129,0.12); }
    .sticker.amber   { border-color: var(--amber);   color: var(--amber);   background: rgba(245,158,11,0.12); }
  </style>
</head>
<body>

<div
  id="stage"
  data-composition-id="product-promo-desktop"
  data-width="1920"
  data-height="1080"
  data-fps="30"
  data-duration="30"
>
  <div class="glow"></div>

  <audio src="voice.mp3" data-start="1.0" data-duration="25.0" data-volume="1"></audio>

  <!-- ═══ SCENE 0 · Brand stamp · 0 – 0.85s ═══ -->
  <div class="scene" id="s0" data-start="0" data-duration="0.85" data-track-index="0"
       style="flex-direction:column;">
    <div class="brand-col">
      <img class="brand-logo" src="assets/logo.png" onerror="this.style.display='none'" alt="" />
      <div class="brand-name"><!-- BRAND: Product Name --></div>
      <div class="brand-tagline"><!-- BRAND: Your tagline --></div>
    </div>
  </div>

  <!-- ═══ SCENE 1 · Hook · 0.85 – 3.0s ═══ -->
  <div class="scene" id="s1" data-start="0.85" data-duration="2.15" data-track-index="1">
    <div class="hook-copy">
      <div class="hook-eyebrow"><!-- BRAND: YOURAPP · CATEGORY --></div>
      <div class="hook-question"><!-- COPY: ¿Your hook question? --></div>
      <div class="hook-sub"><!-- COPY: Short declarative sub. --></div>
    </div>
    <!-- Optional: put a small card or screenshot mockup here on the right -->
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
      <div class="sticker accent" style="position:relative;transform:rotate(4deg)"><!-- COPY: sticker text --></div>
    </div>
  </div>

  <!-- ═══ SCENE 2 · Card A · 3.0 – 9.7s ═══ -->
  <div class="scene" id="s2" data-start="3.0" data-duration="6.7" data-track-index="2">
    <div style="flex:0.85; display:flex; flex-direction:column; justify-content:center; gap:12px;">
      <div style="font-size:44px;font-weight:900;"><!-- COPY: Scene 2 headline --></div>
      <div style="font-size:28px;color:var(--muted);line-height:1.4;"><!-- COPY: scene 2 body --></div>
    </div>
    <div class="card" style="flex:1.4; max-width:860px;">
      <div class="card-header">
        <div class="mac-dots"><div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div></div>
        <div class="card-title"><!-- COPY: card title --></div>
        <div class="card-tag"><!-- COPY: tag --></div>
      </div>
      <div class="card-body">
        <div class="stats">
          <div class="stat"><div class="stat-num">42</div><div class="stat-label">Clientes</div></div>
          <div class="stat"><div class="stat-num">18</div><div class="stat-label">Activos</div></div>
          <div class="stat"><div class="stat-num">$320k</div><div class="stat-label">Facturado</div></div>
        </div>
        <div class="row"><span class="row-name">Empresa Alfa</span><span class="row-meta">Plan Pro</span><span class="badge done"><span class="badge-dot"></span>Al día</span></div>
        <div class="row"><span class="row-name">Beta SRL</span><span class="row-meta">Plan Básico</span><span class="badge active"><span class="badge-dot"></span>En curso</span></div>
        <div class="row"><span class="row-name">Gamma SA</span><span class="row-meta">Plan Pro</span><span class="badge pending"><span class="badge-dot"></span>Pendiente</span></div>
      </div>
    </div>
  </div>

  <!-- ═══ SCENE 3 · Card B · 9.7 – 15.7s ═══ -->
  <div class="scene" id="s3" data-start="9.7" data-duration="6.0" data-track-index="3">
    <div class="card" style="flex:1.4; max-width:860px;">
      <div class="card-header">
        <div class="mac-dots"><div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div></div>
        <div class="card-title"><!-- COPY: card title --></div>
        <div class="card-tag"><!-- COPY: tag --></div>
      </div>
      <div class="card-body">
        <div class="kanban">
          <div class="kanban-col">
            <div class="kanban-label">Pendiente</div>
            <div class="kanban-item pending"><!-- item --><div class="kanban-sub"><!-- meta --></div></div>
            <div class="kanban-item pending"><!-- item --><div class="kanban-sub"><!-- meta --></div></div>
          </div>
          <div class="kanban-col">
            <div class="kanban-label">En curso</div>
            <div class="kanban-item active"><!-- item --><div class="kanban-sub"><!-- meta --></div></div>
            <div class="kanban-item active"><!-- item --><div class="kanban-sub"><!-- meta --></div></div>
          </div>
          <div class="kanban-col">
            <div class="kanban-label">Listo</div>
            <div class="kanban-item done"><!-- item --><div class="kanban-sub"><!-- meta --></div></div>
            <div class="kanban-item done"><!-- item --><div class="kanban-sub"><!-- meta --></div></div>
          </div>
        </div>
      </div>
    </div>
    <div style="flex:0.85; display:flex; flex-direction:column; justify-content:center; gap:12px;">
      <div style="font-size:44px;font-weight:900;"><!-- COPY: Scene 3 headline --></div>
      <div style="font-size:28px;color:var(--muted);line-height:1.4;"><!-- COPY: scene 3 body --></div>
    </div>
  </div>

  <!-- ═══ SCENE 4 · Card C · 15.7 – 21.6s ═══ -->
  <div class="scene" id="s4" data-start="15.7" data-duration="5.9" data-track-index="4">
    <div style="flex:0.85; display:flex; flex-direction:column; justify-content:center; gap:12px;">
      <div style="font-size:44px;font-weight:900;"><!-- COPY: Scene 4 headline --></div>
      <div style="font-size:28px;color:var(--muted);line-height:1.4;"><!-- COPY: scene 4 body --></div>
    </div>
    <div class="card" style="flex:1.4; max-width:860px;">
      <div class="card-header">
        <div class="mac-dots"><div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div></div>
        <div class="card-title"><!-- COPY: card title --></div>
        <div class="card-tag"><!-- COPY: tag --></div>
      </div>
      <div class="card-body">
        <div class="feature-list">
          <div class="feature-row"><div class="feature-icon">📋</div><span><!-- feature --></span><span class="feature-val"><!-- val --></span></div>
          <div class="feature-row"><div class="feature-icon">⚡</div><span><!-- feature --></span><span class="feature-val"><!-- val --></span></div>
          <div class="feature-row"><div class="feature-icon">🔔</div><span><!-- feature --></span><span class="feature-val"><!-- val --></span></div>
          <div class="feature-row"><div class="feature-icon">✅</div><span><!-- feature --></span><span class="feature-val"><!-- val --></span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCENE 5 · CTA · 21.6 – 30s ═══ -->
  <div class="scene" id="s5" data-start="21.6" data-duration="8.4" data-track-index="5">
    <div class="cta-copy">
      <img class="brand-logo" src="assets/logo.png" onerror="this.style.display='none'" style="margin-bottom:28px;" alt="" />
      <div class="cta-offer">30 días gratis<br>sin tarjeta</div>
      <div class="cta-pill"><!-- BRAND: your.domain.com --></div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;">
      <div class="sticker green"  style="position:relative;transform:rotate(4deg)">GRATIS</div>
      <div class="sticker accent" style="position:relative;transform:rotate(-5deg)">SIN TARJETA</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const tl = gsap.timeline({ paused: true })

tl.to('#s0', { opacity: 1, duration: 0 }, 0)
tl.from('#s0 .brand-logo',    { scale: 0.7, opacity: 0, duration: 0.4, ease: 'back.out(1.4)' }, 0.05)
tl.from('#s0 .brand-name',    { y: 24, opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.25)
tl.from('#s0 .brand-tagline', { y: 16, opacity: 0, duration: 0.3,  ease: 'power2.out' }, 0.38)
tl.to('#s0', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 0.5)

tl.to('#s1', { opacity: 1, duration: 0 }, 0.85)
tl.from('#s1 .hook-eyebrow',  { y: -20, opacity: 0, duration: 0.3, ease: 'power2.out' }, 0.9)
tl.from('#s1 .hook-question', { y: 36,  opacity: 0, duration: 0.4, ease: 'power3.out' }, 1.0)
tl.from('#s1 .hook-sub',      { y: 20,  opacity: 0, duration: 0.35,ease: 'power2.out' }, 1.2)
tl.from('#s1 .sticker',       { scale: 0.5, opacity: 0, duration: 0.3, ease: 'back.out(2)' }, 1.3)
tl.to('#s1', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 2.65)

tl.to('#s2', { opacity: 1, duration: 0 }, 3.0)
tl.from('#s2 > div:first-child > *', { x: -30, opacity: 0, stagger: 0.12, duration: 0.35, ease: 'power2.out' }, 3.1)
tl.from('#s2 .card',   { x: 50, opacity: 0, duration: 0.5, ease: 'power3.out' }, 3.15)
tl.from('#s2 .stat',   { y: 16, opacity: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out' }, 3.55)
tl.from('#s2 .row',    { x: -16, opacity: 0, stagger: 0.1, duration: 0.3, ease: 'power2.out' }, 3.8)
tl.to('#s2', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 9.35)

tl.to('#s3', { opacity: 1, duration: 0 }, 9.7)
tl.from('#s3 .card',         { x: -50, opacity: 0, duration: 0.5, ease: 'power3.out' }, 9.8)
tl.from('#s3 > div:last-child > *', { x: 30, opacity: 0, stagger: 0.12, duration: 0.35, ease: 'power2.out' }, 9.85)
tl.from('#s3 .kanban-col',   { y: 24, opacity: 0, stagger: 0.1, duration: 0.3, ease: 'power2.out' }, 10.2)
tl.from('#s3 .kanban-item',  { x: -12, opacity: 0, stagger: 0.06, duration: 0.25, ease: 'power2.out' }, 10.45)
tl.to('#s3', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 15.35)

tl.to('#s4', { opacity: 1, duration: 0 }, 15.7)
tl.from('#s4 > div:first-child > *', { x: -30, opacity: 0, stagger: 0.12, duration: 0.35, ease: 'power2.out' }, 15.8)
tl.from('#s4 .card',         { x: 50, opacity: 0, duration: 0.5, ease: 'power3.out' }, 15.85)
tl.from('#s4 .feature-row',  { x: -20, opacity: 0, stagger: 0.1, duration: 0.3, ease: 'power2.out' }, 16.2)
tl.to('#s4', { opacity: 0, duration: 0.35, ease: 'power2.inOut' }, 21.25)

tl.to('#s5', { opacity: 1, duration: 0 }, 21.6)
tl.from('#s5 .brand-logo',   { scale: 0.6, opacity: 0, duration: 0.45, ease: 'back.out(1.5)' }, 21.65)
tl.from('#s5 .cta-offer',    { y: 32, opacity: 0, duration: 0.5,  ease: 'power3.out' }, 21.95)
tl.from('#s5 .cta-pill',     { scale: 0.85, opacity: 0, duration: 0.4, ease: 'back.out(1.4)' }, 22.35)
tl.from('#s5 .sticker',      { scale: 0.4, opacity: 0, stagger: 0.15, duration: 0.35, ease: 'back.out(2)' }, 22.6)

window.__timelines = window.__timelines || {}
window.__timelines['product-promo-desktop'] = tl
</script>
</body>
</html>
